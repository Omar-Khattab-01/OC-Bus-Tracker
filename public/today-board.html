<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today Board</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --oc-red: #da291c;
      --oc-red-dark: #b82015;
      --oc-black: #0f1115;
      --oc-charcoal: #1d232b;
      --oc-steel: #2f3844;
      --oc-white: #f8fafc;
      --oc-mist: #d7dde6;
      --ok: #39b66c;
      --warn: #ffb348;
      --card: rgba(20, 25, 31, 0.84);
      --card-strong: rgba(29, 35, 43, 0.94);
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--oc-white);
      font-family: 'IBM Plex Sans', sans-serif;
      background:
        radial-gradient(circle at 10% -10%, rgba(218, 41, 28, 0.28) 0%, transparent 38%),
        radial-gradient(circle at 90% 15%, rgba(57, 182, 108, 0.14) 0%, transparent 28%),
        linear-gradient(180deg, #141920 0%, #0f1318 100%);
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20vh -20vw;
      background-image: repeating-linear-gradient(
        120deg,
        transparent 0,
        transparent 58px,
        rgba(255, 255, 255, 0.03) 58px,
        rgba(255, 255, 255, 0.03) 59px
      );
      pointer-events: none;
      animation: drift 16s linear infinite;
    }

    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(50px); }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1240px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(110deg, rgba(218, 41, 28, 0.16), rgba(15, 17, 21, 0.35));
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .badge {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--oc-red), var(--oc-red-dark));
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.5px;
    }

    .title h1 {
      margin: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--oc-mist);
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-link,
    .header-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--oc-white);
      text-decoration: none;
      font: inherit;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      white-space: nowrap;
    }

    .header-link:hover,
    .header-btn:hover {
      border-color: rgba(255, 255, 255, 0.32);
      background: rgba(255, 255, 255, 0.1);
    }

    .status {
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--oc-mist);
      white-space: nowrap;
    }

    .status.ok {
      color: #dff6e6;
      border-color: rgba(57, 182, 108, 0.55);
    }

    .status.warn {
      color: #ffe5bc;
      border-color: rgba(255, 179, 72, 0.55);
    }

    .main {
      padding: 22px;
      display: grid;
      gap: 20px;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .page-head h2 {
      margin: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 34px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .page-head p {
      margin: 8px 0 0;
      color: var(--oc-mist);
      max-width: 760px;
      line-height: 1.5;
    }

    .meta-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
      min-width: min(100%, 520px);
    }

    .stat-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .stat-card .k {
      display: block;
      color: var(--oc-mist);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-card .v {
      display: block;
      margin-top: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      line-height: 1;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .section-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.12);
    }

    .section-head h3 {
      margin: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-head span {
      color: var(--oc-mist);
      font-size: 13px;
    }

    .section-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .board-item {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      background: var(--card-strong);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .board-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .board-top h4 {
      margin: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .board-top p,
    .board-copy,
    .board-copy-line {
      margin: 0;
      color: var(--oc-mist);
      line-height: 1.45;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      white-space: nowrap;
    }

    .pill.trip {
      border-color: rgba(57, 182, 108, 0.45);
      color: #dff6e6;
    }

    .pill.break {
      border-color: rgba(255, 179, 72, 0.45);
      color: #ffe5bc;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .detail-card strong {
      display: block;
      color: var(--oc-mist);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .detail-card span {
      display: block;
      line-height: 1.45;
    }

    .bus-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .bus-chip {
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--oc-white);
    }

    .empty {
      padding: 20px 18px;
      color: var(--oc-mist);
      line-height: 1.5;
    }

    .error {
      border: 1px solid rgba(255, 179, 72, 0.35);
      border-radius: 18px;
      padding: 16px 18px;
      background: rgba(255, 179, 72, 0.08);
      color: #ffe5bc;
    }

    @media (max-width: 980px) {
      .section-grid,
      .details-grid {
        grid-template-columns: 1fr;
      }

      .meta-strip {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        min-width: 0;
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .header,
      .main {
        padding: 16px;
      }

      .board-top {
        flex-direction: column;
      }

      .meta-strip {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="badge">OC</div>
        <div class="title">
          <h1>Today Board</h1>
          <p>Active paddles, active breaks, and live bus matches in one view</p>
        </div>
      </div>
      <div class="header-actions">
        <a class="header-link" href="/">Back to Lookup</a>
        <button id="refreshBtn" class="header-btn" type="button">Refresh</button>
        <div id="status" class="status">Loading</div>
      </div>
    </header>

    <section class="main">
      <section class="page-head">
        <div>
          <h2>Dispatch View</h2>
          <p id="boardSummary">Checking the current active paddles for today.</p>
        </div>
        <div id="metaStrip" class="meta-strip" aria-label="Board totals"></div>
      </section>

      <div id="errorBox" class="error" hidden></div>

      <section class="section-grid">
        <article class="section-card">
          <div class="section-head">
            <h3>Active Trips</h3>
            <span id="tripCount">0 paddles</span>
          </div>
          <div id="tripSection" class="section-body"></div>
        </article>

        <article class="section-card">
          <div class="section-head">
            <h3>Active Breaks</h3>
            <span id="breakCount">0 paddles</span>
          </div>
          <div id="breakSection" class="section-body"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const refreshBtn = document.getElementById('refreshBtn');
    const boardSummary = document.getElementById('boardSummary');
    const metaStrip = document.getElementById('metaStrip');
    const tripCount = document.getElementById('tripCount');
    const breakCount = document.getElementById('breakCount');
    const tripSection = document.getElementById('tripSection');
    const breakSection = document.getElementById('breakSection');
    const errorBox = document.getElementById('errorBox');

    let refreshTimer = null;
    let refreshInFlight = false;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(text, tone = '') {
      statusEl.textContent = text;
      statusEl.classList.remove('ok', 'warn');
      if (tone) statusEl.classList.add(tone);
    }

    function formatIsoTime(value) {
      const timestamp = Date.parse(String(value || ''));
      if (!Number.isFinite(timestamp)) return '';
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Toronto',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
      }).format(new Date(timestamp));
    }

    function renderMetaStats(counts) {
      const stats = [
        ['Active', counts?.activeNow || 0],
        ['Trips', counts?.activeTrips || 0],
        ['Breaks', counts?.activeBreaks || 0],
        ['Buses', counts?.trackedBuses || 0],
      ];
      metaStrip.innerHTML = stats.map(([label, value]) => `
        <div class="stat-card">
          <span class="k">${escapeHtml(label)}</span>
          <span class="v">${escapeHtml(value)}</span>
        </div>
      `).join('');
    }

    function renderBusList(buses) {
      if (!Array.isArray(buses) || !buses.length) {
        return '<div class="board-copy">No live bus is mapped to this paddle right now.</div>';
      }
      return `<div class="bus-list">${buses.map((bus) => {
        const routeBits = [];
        if (bus.route) routeBits.push(`Route ${bus.route}`);
        if (bus.tripNumber) routeBits.push(`Trip ${bus.tripNumber}`);
        return `<span class="bus-chip">Bus ${escapeHtml(bus.busNumber)}${routeBits.length ? ` | ${escapeHtml(routeBits.join(' | '))}` : ''}</span>`;
      }).join('')}</div>`;
    }

    function renderDetail(label, value) {
      return `
        <div class="detail-card">
          <strong>${escapeHtml(label)}</strong>
          <span>${escapeHtml(value || 'N/A')}</span>
        </div>
      `;
    }

    function renderBoardItem(item) {
      const state = item.activeState || {};
      const buses = item.buses || [];
      const routeText = Array.isArray(item.routes) && item.routes.length ? item.routes.join(', ') : '';
      return `
        <article class="board-item">
          <div class="board-top">
            <div>
              <h4>${escapeHtml(item.block || item.paddleId || 'Unknown')}</h4>
              <p>${escapeHtml(state.title || 'Active paddle')}</p>
              <p class="board-copy-line">${escapeHtml(state.detail || '')}</p>
            </div>
            <div class="pill ${escapeHtml(state.kind || 'trip')}">
              <span>${escapeHtml(state.kind === 'break' ? 'Break' : 'Trip')}</span>
              <span>${escapeHtml(state.minutesRemaining ?? 0)} min left</span>
            </div>
          </div>

          ${renderBusList(buses)}

          <div class="details-grid">
            ${renderDetail('Paddle', item.paddleId)}
            ${renderDetail('Service', item.serviceDay)}
            ${renderDetail('Variant', item.displayVariantLabel || item.variantLabel)}
            ${renderDetail('Live Until', state.targetTime)}
            ${renderDetail('Routes', routeText)}
            ${renderDetail('Garage', item.garage)}
            ${renderDetail('Sign-on', item.signOn)}
            ${renderDetail('Bus Type', item.busType)}
          </div>

          <div class="board-copy">
            ${escapeHtml(item.carryover ? 'Overnight carryover from the previous service day.' : (item.sourceLabel || 'Current paddle data'))}
            ${item.effective ? ` Effective ${escapeHtml(item.effective)}.` : ''}
            ${buses[0]?.verifiedAt ? ` Live match verified ${escapeHtml(formatIsoTime(buses[0].verifiedAt))}.` : ''}
          </div>
        </article>
      `;
    }

    function renderSection(root, items, emptyText) {
      root.innerHTML = Array.isArray(items) && items.length
        ? items.map(renderBoardItem).join('')
        : `<div class="empty">${escapeHtml(emptyText)}</div>`;
    }

    function renderBoard(data) {
      errorBox.hidden = true;
      boardSummary.textContent = `${data.serviceLabel || 'Today'} service. Updated ${formatIsoTime(data.generatedAt) || 'just now'}.`;
      renderMetaStats(data.counts || {});
      tripCount.textContent = `${(data.activeTrips || []).length} paddles`;
      breakCount.textContent = `${(data.activeBreaks || []).length} paddles`;
      renderSection(tripSection, data.activeTrips || [], 'No active trips are running right now.');
      renderSection(breakSection, data.activeBreaks || [], 'No active breaks are running right now.');
    }

    async function loadBoard() {
      if (refreshInFlight) return;
      refreshInFlight = true;
      setStatus('Refreshing', '');
      refreshBtn.disabled = true;

      try {
        const response = await fetch('/api/today-board', { cache: 'no-store' });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || 'Today Board failed to load.');
        }
        renderBoard(data);
        setStatus('Board Ready', 'ok');
      } catch (error) {
        errorBox.hidden = false;
        errorBox.textContent = String(error.message || 'Today Board failed to load.');
        setStatus('Board Error', 'warn');
      } finally {
        refreshBtn.disabled = false;
        refreshInFlight = false;
      }
    }

    refreshBtn.addEventListener('click', () => {
      loadBoard();
    });

    loadBoard();
    refreshTimer = window.setInterval(loadBoard, 15000);
  </script>
</body>
</html>
